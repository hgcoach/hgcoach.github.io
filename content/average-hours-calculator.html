<!-- htmlhint ignore: doctype-first -->

<h3 id='tool-name'>
  Average hours calculator
  <i class='tooltip fa-solid fa-circle-info'>
    <span class='tooltip-text'>Cohort 0-3 Master Coaches who averaged at least 20 worked coaching hours (in the 3 or 6 months preceding the end of a billing period) should qualify for the $200 monthly retention fee.</span>
  </i>
</h3>

<label for='billing-period-end-year'>Billing period end date</label><br>
<span class='space-between'>
  <span>
    <span id='editable-billing-period-end-date'>
      <input type='text'
             class='number'
             id='billing-period-end-year'
             placeholder='yyyy'
             title='Full year number'
             style='width: 2.07rem'/>
      <code id='billing-period-year-month-separator'>-</code>
      <input type='text'
             class='number'
             id='billing-period-end-month'
             placeholder='mm'
             title='Month number'
             style='width: 1.82rem'/>
      <code id='billing-period-month-day-separator'>-</code>
      <code id='billing-period-end-day'>25</code>
    </span>
    <code id='billing-period-end-date'
          class='accented'
          hidden='true'></code>
    <code class='annotation'>(23:59 UTC)</code>
  </span>
  <input id='billing-period-date-reset-button'
         type='button'
         value='Reset'
         onclick='resetAverageWeeklyHoursCalculator()'
         hidden>
</span><br>

<input id='calculate-date-ranges-button'
       type='button'
       value='Calculate date ranges'
       onclick='calculateStartDates()'>

<div id='worked-hours-inputs' hidden>

  <label for='6-month-worked-hours'>
    <span>Enter hours worked since</span>
    <code id='6-month-start-date'
          class='accented'></code>
    <code class='annotation'>(00:00 UTC)</code>
  </label><br>
  <input type='text'
         class='number'
         id='6-month-worked-hours'
         placeholder='0'
         title='Non-negative number'
         style='width: 1.79rem'><br><br>

  <label for='3-month-worked-hours'>
    <span>Enter hours worked since</span>
    <code id='3-month-start-date'
          class='accented'></code>
    <code class='annotation'>(00:00 UTC)</code>
  </label><br>
  <input type='text'
         class='number'
         id='3-month-worked-hours'
         placeholder='0'
         title='Non-negative number'
         style='width: 1.79rem'><br><br>

  <input id='calculate-average-hours-button'
         type='button'
         value='Calculate'
         onclick='calculateAverageWeeklyHours()'>

</div>

<div id='average-hours-results' hidden><br><br>

  <span for='average-weekly-hours'>Average weekly hours</span><br>
  <span class='space-between'>

    <code id='average-weekly-hours'
          class='accented'></code>
    <input id='toggle-average-hours-breakdown-button'
           type='button'
           value='Show breakdown'
           onclick='toggleAverageHoursBreakdown()'>

  </span>

  <code id='average-weekly-hours-breakdown'
      hidden></code>

</div>
