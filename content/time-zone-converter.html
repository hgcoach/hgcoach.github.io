<h3 id='tool-name'>
  Time zone converter
  <i class='tooltip
            fa-solid
            fa-circle-info'>
    <div class='tooltip-text'>You can copy and paste the client's time zone from the "Time Zone" section in the client profile.</div>
  </i>
</h3>

<datalist id='time-zones'></datalist>

<table>
  <tr>
    <th><label for='original-time-zone'>Original time zone</label></th>
  </tr>
  <tr class='padding-below'>
    <td><input id='original-time-zone'
               type='text'
               class='time-zone'
               list='time-zones'></td>
  </tr>
</table>

<table>
  <tr>
    <th><label for='original-date'>Original date</label></th>
    <th><label for='original-time'>Original time</label></th>
  </tr>
  <tr class='padding-below'>
    <td><input id='original-date'
               type='date'></td>
    <td><input id='original-time'
               type='time'></td>
  </tr>
</table>

<button onclick='populateCurrentTime()'>Use current time</button><br><br>

<table>
  <tr>
    <th><label for='new-time-zone'>New time zone</label></th>
  </tr>
  <tr class='padding-below'>
    <td><input id='new-time-zone'
               type='text'
               class='time-zone'
               list='time-zones'></td>
  </tr>
</table>

<button onclick='convertToNewTimeZone()'>Convert</button>

<button id='switch-clock-format-button'
        onclick='switchClockFormat(this)'
        hidden></button>

<div id='time-zone-conversion-results'
     hidden><br>

  <div>Original date and time</div>
  <div id='original-datetime'
       class='annotation'></div><br>

  <div>New date and time</div>
  <div id='new-datetime'
       class='accented'></div>

</div>
