<!DOCTYPE html>

<html lang='en' data-theme='dark'>

  <head>
    <link rel='stylesheet'
          href='app.css'>
    <title>HG Coach Toolkit</title>
    <link rel='icon'
          type='image/x-icon'
          href='images/favicon.svg'>
  </head>

  <body>

    <header>

      <div id='page-title-and-theme-toggle'>

        <!-- Page title -->
        <i id='logo'
           class='fa-solid fa-screwdriver-wrench'></i>
        <h1>HG Coach Toolkit</h1>

        <!-- Theme toggle -->
        <button id='theme-toggle'
                onclick='toggleTheme(this)'>
          <i class='fa-solid fa-moon'
             hidden></i>
          <i class='fa-solid fa-sun'></i>
        </button>

      </div>

      <div id='navigation-bar'>
        <button class='left'
                onclick='loadTool("time-zone-converter", this);'>Time zone<br>converter</button>
        <button onclick='loadTool("dst-lookup", this);'>When is DST</button>
        <button onclick='loadTool("average-hours-calculator", this);'>Average hours<br>calculator</button>
        <button class='right'
                onclick='loadTool("bonus-calculator", this);'>Bonus<br>calculator</button>
      </div>

    </header>

    <main>

        <div id='loading-indicator-container' hidden>
          <div class='loading-indicator'>
            <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
          </div>
        </div>

        <div id='tool-container'></div>

    </main>

    <footer>
      <div id='disclaimer'>
        This website is unaffiliated with HG, may not be actively maintained, and may not be 100% reliable. If you notice any problems with it, feel free to message
        <span class='discord'>
          <i class='fa-brands fa-discord'></i>
        sim_hg
        </span>.
      </div>
    </footer>

    <!-- Third-party scripts -->
    <script src='https://kit.fontawesome.com/e6dcd170d4.js'
            crossorigin='anonymous'></script>

    <script src='https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js'></script>

    <script src='https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/duration.js'></script>
    <script>dayjs.extend(window.dayjs_plugin_duration);</script>

    <script src='https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/utc.js'></script>
    <script>dayjs.extend(window.dayjs_plugin_utc);</script>

    <script src='https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/timezone.js'></script>
    <script>dayjs.extend(window.dayjs_plugin_timezone);</script>

    <script src='scripts/jquery-3.7.1.js'></script>

    <!-- Main script -->
    <script src='scripts/app.js'></script>

    <!-- Tool scripts -->
    <script src='scripts/timeZoneConverter.js'></script>
    <script src='scripts/dstLookup.js'></script>
    <script src='scripts/averageHoursCalculator.js'></script>
    <script src='scripts/bonusCalculator.js'></script>

  </body>

</html>
